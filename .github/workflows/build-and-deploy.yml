name: Build and Deploy

on:
  push:
    branches: ["**"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust code
        run: cargo check --all-targets

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

      # vercel-rust is unmaintained vs. current CLI build API. v53.x breaks `vercel build` too (`reading 'target'`).
      # Pin CLI 52.x for builds; API deploy uses build + --prebuilt so Vercel cloud doesn't re-run rust builder.
      - name: Install Vercel CLI
        run: npm install --global vercel@52.2.1

      - name: Link to Existing Vercel Project
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json << EOF
          {
            "orgId": "${{ secrets.ORG_ID }}",
            "projectId": "${{ secrets.PROJECT_ID }}"
          }
          EOF

      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "VERCEL_ENV=production" >> $GITHUB_ENV
            echo "DEPLOY_ARGS=--prod" >> $GITHUB_ENV
          else
            echo "VERCEL_ENV=preview" >> $GITHUB_ENV
            echo "DEPLOY_ARGS=" >> $GITHUB_ENV
          fi

      - name: Deploy API to Vercel
        run: |
          set -euo pipefail
          if [ "${VERCEL_ENV}" = "production" ]; then
            vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
            vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
            DEPLOY_OUTPUT=$(vercel deploy --prebuilt --yes --prod --token="${{ secrets.VERCEL_TOKEN }}")
          else
            vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
            vercel build --token="${{ secrets.VERCEL_TOKEN }}"
            DEPLOY_OUTPUT=$(vercel deploy --prebuilt --yes --token="${{ secrets.VERCEL_TOKEN }}")
          fi

          DEPLOYMENT_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://.*\.vercel\.app' | head -1)
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV

          echo "✅ API Deployment successful!"
          echo "Environment: ${VERCEL_ENV}"
          echo "Deployment URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
          VERCEL_ENV: ${{ env.VERCEL_ENV }}

      - name: Deploy Docs to Vercel
        run: |
          cd docs-site
          DOCS_OUTPUT=$(vercel ${{ env.DEPLOY_ARGS }} --yes --token=${{ secrets.VERCEL_TOKEN }})

          DOCS_URL=$(echo "$DOCS_OUTPUT" | grep -o 'https://.*\.vercel\.app' | head -1)
          echo "DOCS_URL=$DOCS_URL" >> $GITHUB_ENV

          echo "✅ Docs Deployment successful!"
          echo "Environment: ${{ env.VERCEL_ENV }}"
          echo "Deployment URL: $DOCS_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.DOCS_PROJECT_ID }}
          VERCEL_ENV: ${{ env.VERCEL_ENV }}

      - name: Print Final URLs
        run: |
          echo "🎉 Deployments completed!"
          echo "Environment: ${{ env.VERCEL_ENV }}"
          echo "API URL: ${{ env.DEPLOYMENT_URL }}"
          echo "Docs URL: ${{ env.DOCS_URL }}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Production: Configure your production domains in Vercel dashboard"
          else
            echo "Preview (API): ${{ env.DEPLOYMENT_URL }}"
            echo "Preview (Docs): ${{ env.DOCS_URL }}"
          fi
